version: "2026-04-22"
run_name: "lfm25_vl_full_eval"
purpose: "Prepare frozen non-demo gold eval artifacts for a full benchmark or post-train validation run."
dataset:
  historical_endpoint: "http://localhost:9005/data/image/sentinel"
  replay_dataset: "training/replay_pack/non_demo_eval.jsonl"
  capture_overrides: "training/replay_pack/non_demo_capture_overrides.json"
  capture_output_dir: "training/corpus/lfm25-vl-non-demo/capture"
  corpus_output_dir: "training/corpus/lfm25-vl-non-demo/corpus"
  leap_output_dir: "training/corpus/lfm25-vl-non-demo/leap_vlm_sft"
  dataset_manifest_name: "dataset_manifest.json"
model:
  model_id: "LiquidAI/LFM2.5-VL-450M"
  task_kind: "candidate_json_sft"
eval:
  mode: "full_eval"
  benchmark_on_start: true
  max_eval_cases: null
  save_full_predictions: true
runtime:
  execution_environment: "hf_jobs"
  editable_extras: "dev,vlm,train"
  output_dir: "/outputs/blackline-train"
hf_job:
  flavor: "l4x1"
  timeout: "6h"
