version: "2026-04-25"
run_name: "lfm25_vl_sft_train_hf_aux_v6"
purpose: "Prepare and submit a remote LEAP VLM train run for Train 01 plus widened public auxiliary transfer data on HF Jobs."
dataset:
  historical_endpoint: "http://localhost:9005/data/image/sentinel"
  replay_dataset: "training/replay_pack/train_01.jsonl"
  aux_candidate_eval_datasets:
    - "training/eval_runs/aux-train-inputs/aux_public_seed_v5/blackline_candidate_eval.jsonl"
    - "training/eval_runs/aux-train-inputs/satellite_disruption_aux_v1_1/blackline_candidate_eval.jsonl"
  capture_overrides: "training/replay_pack/train_01_capture_overrides.json"
  capture_output_dir: "training/corpus/lfm25-vl-train-01/capture"
  capture_manifest: "training/corpus/lfm25-vl-train-01/capture/simsat_capture_manifest.json"
  corpus_output_dir: "training/corpus/lfm25-vl-train-01-aux-v6/corpus"
  leap_output_dir: "training/corpus/lfm25-vl-train-01-aux-v6/leap_vlm_sft"
  dataset_manifest_name: "dataset_manifest.json"
model:
  model_id: "LiquidAI/LFM2.5-VL-450M"
  task_kind: "candidate_json_sft"
eval:
  mode: "smoke"
  benchmark_on_start: true
  max_eval_cases: 8
  save_full_predictions: false
runtime:
  execution_environment: "hf_jobs"
  editable_extras: "dev,vlm,train"
  output_dir: "/outputs/blackline-train"
hf_job:
  flavor: "l4x1"
  timeout: "6h"
trainer:
  backend: "leap_finetune"
  project_name: "blackline-atlas"
  dataset_test_size: 0.1
  dataset_limit: null
  authoritative_eval_note: "Frozen Blackline eval stays separate. The trainer-side test_size split is diagnostics only."
  training_config:
    extends: "DEFAULT_VLM_SFT"
    num_train_epochs: 2
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 8
    learning_rate: 2.0e-5
    logging_steps: 5
    eval_on_start: true
    eval_strategy: "epoch"
    save_strategy: "epoch"
    save_total_limit: 1
    warmup_ratio: 0.03
    lr_scheduler_type: "cosine"
  peft_config:
    extends: "DEFAULT_VLM_LORA"
    use_peft: true
