<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blackline Atlas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@5.12.0/dist/maplibre-gl.css"
    />
    <link rel="stylesheet" href="/ui-static/shell.css" />
    <script defer src="https://unpkg.com/maplibre-gl@5.12.0/dist/maplibre-gl.js"></script>
    <script defer src="/ui-static/shell.js"></script>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <p class="badge">Blackline Atlas</p>

        <div class="topchips">
          <span class="chip neutral" id="health-chip">connecting</span>
          <span class="chip neutral" id="mode-chip">replay-safe</span>
          <span class="chip degraded" id="planner-chip" hidden>planner fallback</span>
          <span class="chip neutral" id="alert-chip">0 alerts</span>
        </div>
      </header>

      <main class="workspace">
        <section class="panel map-panel">
          <div class="map-stage" id="map-stage">
            <div class="map-canvas" id="map-canvas" aria-hidden="true"></div>
            <div class="map-wash"></div>

            <div class="map-trust">
              <span class="map-trust-pill" id="map-trust-state">trust pending</span>
            </div>

            <div class="map-markers" id="map-markers"></div>
          </div>
        </section>

        <section class="panel channel-panel" data-sheet="chat">
          <button class="sheet-toggle" type="button" data-sheet-target="chat">
            <span>Command</span>
            <span class="sheet-toggle-state">dock</span>
          </button>

          <div class="panel-shell">
            <div class="transcript" id="chat-log">
              <article class="message assistant">
                <p class="message-role">atlas</p>
                <p class="message-body">Booting command channel.</p>
              </article>
            </div>

            <form class="composer" id="chat-form">
              <label class="sr-only" for="chat-input">Command</label>
              <input
                id="chat-input"
                name="chat-input"
                type="text"
                autocomplete="off"
                placeholder="Ask: show biggest disruption near the watchlist"
              />
              <button type="submit">Run</button>
            </form>

            <p class="panel-note" id="channel-note" hidden></p>
          </div>
        </section>

        <aside class="panel drawer-panel" data-sheet="site">
          <button class="sheet-toggle" type="button" data-sheet-target="site">
            <span>Site</span>
            <span class="sheet-toggle-state">focus</span>
          </button>

          <div class="panel-shell">
            <div class="site-head">
              <div class="site-head-copy">
                <h1 id="site-name">Waiting for selection</h1>
                <p class="site-summary" id="site-summary">Selection summary pending.</p>
              </div>
              <p class="status-pill idle" id="site-impact">quiet</p>
            </div>

            <p class="drawer-inline site-meta">
              <span id="site-region">-</span>
              <span id="site-type">-</span>
              <span id="site-coords">-</span>
            </p>

            <div class="tray-grid">
              <article class="drawer-card">
                <p class="drawer-label">Current</p>
                <h2 id="current-title">No compare</h2>
                <p class="drawer-summary" id="current-note">Current evidence pending.</p>
                <p class="tray-inline">
                  <span id="current-status">-</span>
                  <span id="current-captured">-</span>
                </p>
              </article>

              <article class="drawer-card">
                <p class="drawer-label">Baseline</p>
                <h2 id="baseline-title">No compare</h2>
                <p class="drawer-summary" id="baseline-note">Baseline reference pending.</p>
                <p class="tray-inline">
                  <span id="baseline-captured">-</span>
                  <span id="baseline-source">-</span>
                </p>
              </article>
            </div>
          </div>
        </aside>
      </main>
    </div>
  </body>
</html>
